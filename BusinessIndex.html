<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MoneyMatters | Business</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--sb-blue:#006b3f;--sb-blue-dark:#004d2c;--aqua:#00a86b;--gold:#d4af37;--coral:#ff6b5f;--ink:#102033;--muted:#64748b;--paper:#ffffff;--soft:#f3f7fb;--line:rgba(16,32,51,0.1);--shadow-sm:0 10px 26px rgba(0,107,63,0.09)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(circle at top left,rgba(0,166,166,0.12),transparent 34rem),linear-gradient(135deg,rgba(0,51,160,0.08),rgba(108,194,74,0.05)),var(--soft);color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif;padding-bottom:70px}
    a{color:inherit;text-decoration:none}
    .topbar{position:sticky;top:0;z-index:1020;background:linear-gradient(135deg,var(--sb-blue-dark),var(--sb-blue));color:#fff;padding:15px 20px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:850;font-size:1.2rem}
    .brand i{font-size:1.5rem;color:var(--gold)}
    .btn-menu{background:rgba(255,255,255,0.15);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer}
    .main{max-width:800px;margin:20px auto;padding:0 15px}
    .hero{background:linear-gradient(135deg,var(--sb-blue-dark),var(--sb-blue));color:#fff;border-radius:16px;padding:25px;margin-bottom:20px;text-align:center}
    .hero h1{font-size:2rem;font-weight:900;margin-bottom:5px}
    .hero p{opacity:0.85;font-size:0.9rem}
    .hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:15px}
    .hero-stat{background:rgba(255,255,255,0.15);padding:12px;border-radius:10px}
    .hero-stat strong{display:block;font-size:1.3rem}
    .hero-stat span{font-size:0.7rem;opacity:0.8}
    .nav-blocks{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
    .nav-block{background:var(--paper);border-radius:12px;padding:20px;text-align:center;box-shadow:var(--shadow-sm);transition:transform 0.2s;display:block;color:var(--ink)}
    .nav-block:hover{transform:translateY(-3px)}
    .nav-block i{font-size:2rem;display:block;margin-bottom:8px}
    .nav-block strong{display:block;font-size:1rem}
    .nav-block small{color:var(--muted);font-size:0.75rem}
    .icon-blue{color:var(--sb-blue)}.icon-gold{color:var(--gold)}.icon-aqua{color:var(--aqua)}.icon-coral{color:var(--coral)}
    .section-title{font-size:1.2rem;font-weight:900;margin:15px 0 10px}
    .card{background:var(--paper);border-radius:12px;padding:18px;box-shadow:var(--shadow-sm);margin-bottom:12px}
    .metric-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .metric-box{background:var(--soft);padding:12px;border-radius:8px;text-align:center}
    .metric-box .value{font-size:1.4rem;font-weight:900;color:var(--sb-blue-dark)}
    .metric-box .label{font-size:0.7rem;color:var(--muted)}
    .btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:0.9rem;cursor:pointer;text-align:center;margin-top:8px}
    .btn-green{background:var(--sb-blue);color:#fff}
    .btn-outline{background:#fff;color:var(--sb-blue);border:2px solid var(--sb-blue)}
    .toast-stack{position:fixed;right:16px;bottom:80px;z-index:1080}
    .app-toast{background:var(--ink);color:#fff;padding:10px 14px;border-radius:8px;margin-top:8px;font-weight:700;font-size:0.85rem}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,0.96);border-top:1px solid var(--line);padding:8px;z-index:1030}
    .mobile-nav a{display:flex;flex-direction:column;align-items:center;font-size:0.65rem;color:var(--muted);font-weight:700}
    .mobile-nav a i{font-size:1.1rem}
    @media(min-width:768px){.mobile-nav{display:none}body{padding-bottom:0}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="MainMenu.html"><i class="bi bi-bank2"></i>MoneyMatters</a>
    <a href="MainMenu.html" class="btn-menu"><i class="bi bi-list me-1"></i>Menu</a>
  </header>

  <main class="main">
    <div class="hero">
      <span style="background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:700"><i class="bi bi-briefcase me-1"></i>BUSINESS</span>
      <h1>Group finance, managed.</h1>
      <p>Track your stokvel contributions and group savings.</p>
      <div class="hero-stats">
        <div class="hero-stat"><strong id="heroPool">R0</strong><span>Total value</span></div>
        <div class="hero-stat"><strong id="heroEmergency">R0</strong><span>Emergency</span></div>
        <div class="hero-stat"><strong id="heroPending">0</strong><span>Pending</span></div>
        <div class="hero-stat"><strong id="heroNext">-</strong><span>Next payout</span></div>
      </div>
    </div>

    <div class="nav-blocks">
      <a href="stokvel.html" class="nav-block"><i class="bi bi-people-fill icon-aqua"></i><strong>Stokvel</strong><small>Group savings</small></a>
      <a href="rentalsandrent.html" class="nav-block"><i class="bi bi-house-door icon-gold"></i><strong>Rentals</strong><small>Property tracking</small></a>
    </div>

    <div class="section-title">Quick overview</div>
    <div class="card">
      <div class="metric-row">
        <div class="metric-box"><div class="value" id="stokvelPayoutValue">R0</div><div class="label">Main pool</div></div>
        <div class="metric-box"><div class="value" id="emergencyFundValue">R0</div><div class="label">Emergency</div></div>
        <div class="metric-box"><div class="value" id="incomingPayments">R0</div><div class="label">Incoming</div></div>
        <div class="metric-box"><div class="value" id="rentDueDisplay">R0</div><div class="label">Rent due</div></div>
      </div>
    </div>

    <button class="btn btn-green" id="payBtn"><i class="bi bi-plus-circle me-2"></i>Pay R250 Contribution</button>
  </main>

  <nav class="mobile-nav">
    <a href="BusinessIndex.html"><i class="bi bi-house"></i>Home</a>
    <a href="stokvel.html"><i class="bi bi-people"></i>Stokvel</a>
    <a href="MainMenu.html"><i class="bi bi-list"></i>Menu</a>
  </nav>

  <div class="toast-stack" id="toastStack"></div>

  <script>
    const money=v=>"R"+Number(v||0).toLocaleString("en-ZA");
    const setText=(id,v)=>{const n=document.getElementById(id);if(n)n.textContent=v};
    const STORAGE_KEY="moneyMattersUltimateStokvelState";
    let state;
    try{state=JSON.parse(localStorage.getItem(STORAGE_KEY))||{stokvel:{mainPool:6450,emergencyFund:1050,payoutIndex:2,members:[{name:"Thabo"},{name:"Priya"},{name:"Lerato"},{name:"Sipho"},{name:"Nandi"}]},transactions:[{status:"pending"},{status:"approved"}],businessData:{incomingPayments:[{amount:2100},{amount:1100}],rent:{amount:1500}},activity:[]}}catch(e){state={stokvel:{mainPool:0,emergencyFund:0,payoutIndex:0,members:[]},transactions:[],businessData:{incomingPayments:[],rent:{amount:0}},activity:[]}}

    function render(){
      setText('heroPool',money((state.stokvel.mainPool||0)+(state.stokvel.emergencyFund||0)));
      setText('heroEmergency',money(state.stokvel.emergencyFund||0));
      setText('heroPending',state.transactions.filter(t=>t.status!=="approved").length);
      setText('heroNext',(state.stokvel.members||[])[state.stokvel.payoutIndex%(state.stokvel.members||[]).length]?.name||'-');
      setText('stokvelPayoutValue',money(state.stokvel.mainPool||0));
      setText('emergencyFundValue',money(state.stokvel.emergencyFund||0));
      setText('incomingPayments',money((state.businessData.incomingPayments||[]).reduce((s,x)=>s+(x.amount||0),0)));
      setText('rentDueDisplay',money(state.businessData.rent?.amount||0));
    }

    document.getElementById('payBtn').addEventListener('click',()=>{
      state.stokvel.emergencyFund=(state.stokvel.emergencyFund||0)+35;
      state.stokvel.mainPool=(state.stokvel.mainPool||0)+215;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      render();
      const t=document.createElement('div');t.className='app-toast';t.textContent='R250 paid! R35 to emergency.';document.getElementById('toastStack').appendChild(t);setTimeout(()=>t.remove(),3000);
    });

    if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
    render();
  </script>
</body>
</html>
