<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MoneyMatters | Main Menu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--sb-blue:#006b3f;--sb-blue-dark:#004d2c;--gold:#d4af37;--paper:#ffffff;--muted:#64748b}
    *{box-sizing:border-box}
    body{min-height:100vh;background:linear-gradient(135deg,#004d2c,#006b3f,#008f54);font-family:"Segoe UI",system-ui,sans-serif;padding:20px;display:flex;align-items:center;justify-content:center}
    .menu-container{max-width:550px;width:100%}
    .topbar-brand{text-align:center;color:white;margin-bottom:25px}
    .topbar-brand i{font-size:3rem;color:var(--gold)}
    .topbar-brand h1{font-weight:800;margin:5px 0}
    .role-card{background:var(--paper);border-radius:20px;padding:30px;box-shadow:0 20px 40px rgba(0,0,0,0.3)}
    .choice-btn{display:block;width:100%;padding:20px;margin:12px 0;border:3px solid #e0e0e0;border-radius:16px;background:white;text-align:center;cursor:pointer;transition:all 0.2s;text-decoration:none;color:var(--ink)}
    .choice-btn:hover{border-color:var(--sb-blue);background:rgba(0,107,63,0.03);transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,0.1)}
    .choice-btn i{font-size:3rem;display:block;margin-bottom:10px;color:var(--sb-blue)}
    .choice-btn strong{font-size:1.3rem;display:block;margin-bottom:5px}
    .choice-btn small{color:var(--muted);font-size:0.85rem}
    .choice-btn.business i{color:#004d2c}
    .choice-btn.personal i{color:var(--gold)}
  </style>
</head>
<body>
  <div class="menu-container">
    <div class="topbar-brand">
      <i class="bi bi-bank2"></i>
      <h1>MoneyMatters</h1>
      <p style="opacity:0.8">Choose your dashboard</p>
    </div>

    <div class="role-card">
      <a href="BusinessIndex.html" class="choice-btn business">
        <i class="bi bi-briefcase"></i>
        <strong>Business Dashboard</strong>
        <small>Spaza Shop · Rentals · Documents</small>
      </a>
      
      <a href="PersonalIndex.html" class="choice-btn personal">
        <i class="bi bi-person"></i>
        <strong>Personal Dashboard</strong>
        <small>Payments · Credit · Community · Stokvels</small>
      </a>
    </div>
  </div>

  <script>
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
  </script>
</body>
</html>
