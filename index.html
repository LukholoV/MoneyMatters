<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MoneyMatters | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--sb-blue:#006b3f;--sb-blue-dark:#004d2c;--gold:#d4af37;--paper:#ffffff;--muted:#64748b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(135deg,#004d2c 0%,#006b3f 50%,#008f54 100%);font-family:"Segoe UI",system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-container{width:100%;max-width:440px}
    .login-card{background:var(--paper);border-radius:24px;padding:40px 30px;box-shadow:0 24px 48px rgba(0,0,0,0.3);text-align:center}
    .logo-circle{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#006b3f,#008f54);display:grid;place-items:center;margin:0 auto 20px}
    .logo-circle i{font-size:2.5rem;color:var(--gold)}
    .form-control{border-radius:12px;padding:12px 16px;border:2px solid #e0e0e0;transition:0.2s}
    .form-control:focus{border-color:var(--sb-blue);box-shadow:0 0 0 3px rgba(0,107,63,0.1)}
    .input-group-text{border-radius:12px 0 0 12px;background:#f8f9fa;border:2px solid #e0e0e0;border-right:none}
    .input-group .form-control{border-left:none;border-radius:0 12px 12px 0}
    .btn-login{background:var(--sb-blue);color:white;border:none;border-radius:12px;padding:14px;font-weight:700;font-size:1.1rem;width:100%;transition:0.2s;cursor:pointer}
    .btn-login:hover{background:var(--sb-blue-dark);transform:translateY(-2px)}
    .btn-skip{background:transparent;color:var(--sb-blue);border:2px solid var(--sb-blue);border-radius:12px;padding:14px;font-weight:700;width:100%;transition:0.2s;cursor:pointer}
    .btn-skip:hover{background:rgba(0,107,63,0.05)}
    .gold-text{color:var(--gold)}
    .demo-note{color:var(--muted);font-size:0.8rem;margin-top:12px}
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-circle"><i class="bi bi-cash-stack"></i></div>
      <h2 class="fw-bold mb-1" style="color:#004d2c">MoneyMatters</h2>
      <p class="text-muted mb-4">Your all-in-one stokvel & finance companion</p>
      
      <div class="text-start mb-3">
        <label class="form-label fw-semibold small">Email address</label>
        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com">
        </div>
        <label class="form-label fw-semibold small">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter password">
        </div>
      </div>
      
      <button class="btn-login mb-3" id="loginBtn"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
      <button class="btn-skip" id="skipBtn">Continue without login <i class="bi bi-arrow-right ms-1"></i></button>
      <p class="demo-note">Demo mode · No credentials required</p>
    </div>
  </div>

  <script>
    function goToMenu(){window.location.href='MainMenu.html'}
    document.getElementById('loginBtn').addEventListener('click',function(e){e.preventDefault();goToMenu()});
    document.getElementById('skipBtn').addEventListener('click',goToMenu);
    document.getElementById('loginPassword').addEventListener('keypress',function(e){if(e.key==='Enter')goToMenu()});
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
  </script>
</body>
</html>
