<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MoneyMatters | Payments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--sb-blue:#006b3f;--sb-blue-dark:#004d2c;--aqua:#00a86b;--gold:#d4af37;--violet:#6750d8;--coral:#ff6b5f;--ink:#102033;--muted:#64748b;--paper:#ffffff;--soft:#f3f7fb;--line:rgba(16,32,51,0.1);--shadow-sm:0 10px 26px rgba(0,107,63,0.09)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(circle at top left,rgba(0,166,166,0.12),transparent 34rem),linear-gradient(135deg,rgba(0,51,160,0.08),rgba(108,194,74,0.05)),var(--soft);color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif;padding-bottom:70px}
    a{color:inherit;text-decoration:none}
    .topbar{position:sticky;top:0;z-index:1020;background:linear-gradient(135deg,var(--sb-blue-dark),var(--sb-blue));color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:850;font-size:1.2rem}
    .brand i{font-size:1.5rem;color:var(--gold)}
    .btn-menu{background:rgba(255,255,255,0.15);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.9rem}
    .main{max-width:1000px;margin:0 auto;padding:20px}
    .hero-card{background:linear-gradient(135deg,var(--sb-blue-dark),var(--sb-blue));color:#fff;border-radius:16px;padding:25px;margin-bottom:20px}
    .hero-badge{background:rgba(255,255,255,0.2);padding:5px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;display:inline-block;margin-bottom:8px}
    .hero-title{font-size:1.8rem;font-weight:900;margin-bottom:3px}
    .hero-subtitle{opacity:0.85;font-size:0.85rem}
    .hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
    .hero-stat{background:rgba(255,255,255,0.15);padding:12px;border-radius:10px;text-align:center}
    .hero-stat .val{display:block;font-size:1.2rem;font-weight:800}
    .hero-stat .lbl{font-size:0.7rem;opacity:0.8}
    .nav-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
    .nav-tile{background:var(--paper);border-radius:12px;padding:18px 10px;text-align:center;box-shadow:var(--shadow-sm);transition:transform 0.2s;display:block}
    .nav-tile:hover{transform:translateY(-3px)}
    .nav-tile.active{border:2px solid var(--sb-blue)}
    .nav-tile i{font-size:1.5rem;display:block;margin-bottom:6px}
    .nav-tile .nav-label{font-size:0.75rem;font-weight:700}
    .icon-gold{color:var(--gold)}.icon-violet{color:var(--violet)}.icon-aqua{color:var(--aqua)}.icon-coral{color:var(--coral)}
    .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .card{background:var(--paper);border-radius:14px;padding:20px;box-shadow:var(--shadow-sm)}
    .card h3{font-size:1rem;font-weight:800;margin-bottom:15px}
    .txn-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
    .txn-item:last-child{border-bottom:0}
    .txn-item .desc{font-weight:600;font-size:0.85rem}
    .txn-item .amt{font-weight:700;font-size:0.9rem}
    .txn-item .amt.in{color:#256b12}.txn-item .amt.out{color:#b34040}
    .input-row{display:flex;gap:8px;margin-top:12px}
    .input-row input{flex:1;padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.85rem}
    .input-row input:focus{border-color:var(--sb-blue);outline:none}
    .btn-green{background:var(--sb-blue);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;width:100%;font-size:0.9rem}
    .btn-green:hover{background:var(--sb-blue-dark)}
    .btn-outline{background:transparent;border:2px solid var(--sb-blue);color:var(--sb-blue);padding:12px;border-radius:8px;font-weight:700;cursor:pointer;width:100%;font-size:0.9rem}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(255,255,255,0.96);border-top:1px solid var(--line);padding:8px 4px;z-index:1030}
    .mobile-nav a{display:flex;flex-direction:column;align-items:center;font-size:0.6rem;color:var(--muted);font-weight:700}
    .mobile-nav a i{font-size:1rem}
    .toast-stack{position:fixed;right:16px;bottom:80px;z-index:1080}
    .app-toast{background:var(--ink);color:#fff;padding:10px 14px;border-radius:8px;margin-top:8px;font-weight:700;font-size:0.85rem}
    @media(min-width:768px){.mobile-nav{display:none}body{padding-bottom:0}}
    @media(max-width:768px){.content-grid{grid-template-columns:1fr}.nav-row{grid-template-columns:repeat(3,1fr)}.hero-stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="PersonalIndex.html"><i class="bi bi-bank2"></i>MoneyMatters</a>
    <a href="MainMenu.html" class="btn-menu"><i class="bi bi-list me-1"></i>Menu</a>
  </header>

  <main class="main">
    <div class="hero-card">
      <span class="hero-badge"><i class="bi bi-cash-coin me-1"></i>PAYMENTS</span>
      <h1 class="hero-title">Track your cash flow.</h1>
      <p class="hero-subtitle">Manage incoming payments and recurring subscriptions.</p>
      <div class="hero-stats">
        <div class="hero-stat"><span class="val" id="incomingPayments">R0</span><span class="lbl">Incoming</span></div>
        <div class="hero-stat"><span class="val" id="subsTotal">R0</span><span class="lbl">Bills</span></div>
        <div class="hero-stat"><span class="val" id="heroPool">R0</span><span class="lbl">Stokvel</span></div>
        <div class="hero-stat"><span class="val" id="heroPending">0</span><span class="lbl">Pending</span></div>
      </div>
    </div>

    <div class="nav-row">
      <a href="payments.html" class="nav-tile active"><i class="bi bi-cash-coin icon-gold"></i><span class="nav-label">Payments</span></a>
      <a href="credit.html" class="nav-tile"><i class="bi bi-speedometer2 icon-violet"></i><span class="nav-label">Credit</span></a>
      <a href="stokvel.html" class="nav-tile"><i class="bi bi-people-fill icon-aqua"></i><span class="nav-label">Stokvels</span></a>
      <a href="community.html" class="nav-tile"><i class="bi bi-chat-dots-fill icon-aqua"></i><span class="nav-label">Community</span></a>
      <a href="Vault.html" class="nav-tile"><i class="bi bi-safe icon-coral"></i><span class="nav-label">Vault</span></a>
    </div>

    <div class="content-grid">
      <div class="card">
        <h3><i class="bi bi-arrow-down-circle text-success me-2"></i>Incoming payments</h3>
        <div id="paymentsList"></div>
        <div class="input-row"><input id="paymentClient" placeholder="Client or payer"><input id="paymentAmount" type="number" placeholder="Amount"></div>
        <button class="btn-green mt-2" id="addPaymentBtn"><i class="bi bi-plus-circle me-1"></i>Add payment</button>
      </div>
      <div class="card">
        <h3><i class="bi bi-arrow-up-circle text-danger me-2"></i>Subscriptions</h3>
        <div id="subscriptionList"></div>
        <div class="input-row"><input id="subscriptionName" placeholder="Name"><input id="subscriptionCost" type="number" placeholder="Cost"></div>
        <button class="btn-outline mt-2" id="addSubscriptionBtn"><i class="bi bi-plus-circle me-1"></i>Add subscription</button>
      </div>
    </div>
  </main>

  <nav class="mobile-nav">
    <a href="payments.html"><i class="bi bi-cash-coin"></i><span>Pay</span></a>
    <a href="credit.html"><i class="bi bi-speedometer2"></i><span>Credit</span></a>
    <a href="stokvel.html"><i class="bi bi-people"></i><span>Stokvel</span></a>
    <a href="community.html"><i class="bi bi-chat-dots"></i><span>Chat</span></a>
    <a href="Vault.html"><i class="bi bi-safe"></i><span>Vault</span></a>
  </nav>

  <div class="toast-stack" id="toastStack"></div>

  <script>
    const money=v=>"R"+Number(v||0).toLocaleString("en-ZA");
    const setText=(id,v)=>{const n=document.getElementById(id);if(n)n.textContent=v};
    const STORAGE_KEY="moneyMattersUltimateStokvelState";
    let state;
    try{state=JSON.parse(localStorage.getItem(STORAGE_KEY))||{stokvel:{mainPool:6450,emergencyFund:1050,transactions:[{status:"pending"}]},personalData:{incomingPayments:[{client:"Salary",amount:4200},{client:"Freelance",amount:650}],subscriptions:[{name:"Rent",cost:4800},{name:"Netflix",cost:159},{name:"Phone",cost:599}]}}}catch(e){state={stokvel:{mainPool:0,emergencyFund:0,transactions:[]},personalData:{incomingPayments:[],subscriptions:[]}}}
    let ad=state.personalData;

    function render(){
      const inc=(ad.incomingPayments||[]).reduce((s,x)=>s+(x.amount||0),0);
      const sub=(ad.subscriptions||[]).reduce((s,x)=>s+(x.cost||0),0);
      setText('incomingPayments',money(inc));setText('subsTotal',money(sub));
      setText('heroPool',money(state.stokvel.mainPool||0));
      setText('heroPending',(state.stokvel.transactions||[]).filter(t=>t.status!=="approved").length);
      document.getElementById('paymentsList').innerHTML=(ad.incomingPayments||[]).map(p=>`<div class="txn-item"><span class="desc"><i class="bi bi-arrow-down-circle text-success me-2"></i>${p.client}</span><span class="amt in">+${money(p.amount)}</span></div>`).join('')||'<p class="muted small">No payments yet</p>';
      document.getElementById('subscriptionList').innerHTML=(ad.subscriptions||[]).map(s=>`<div class="txn-item"><span class="desc"><i class="bi bi-arrow-up-circle text-danger me-2"></i>${s.name}</span><span class="amt out">-${money(s.cost)}</span></div>`).join('')||'<p class="muted small">No subscriptions</p>';
    }

    function showToast(m){const s=document.getElementById('toastStack');const t=document.createElement('div');t.className='app-toast';t.textContent=m;s.appendChild(t);setTimeout(()=>t.remove(),3000)}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}

    document.getElementById('addPaymentBtn').addEventListener('click',()=>{
      const c=document.getElementById('paymentClient').value.trim();
      const a=Number(document.getElementById('paymentAmount').value);
      if(!c||!a||a<=0)return showToast('Enter valid details');
      ad.incomingPayments.unshift({client:c,amount:a});
      document.getElementById('paymentClient').value='';document.getElementById('paymentAmount').value='';
      save();render();showToast('Payment added');
    });
    document.getElementById('addSubscriptionBtn').addEventListener('click',()=>{
      const n=document.getElementById('subscriptionName').value.trim();
      const c=Number(document.getElementById('subscriptionCost').value);
      if(!n||!c||c<=0)return showToast('Enter valid details');
      ad.subscriptions.push({name:n,cost:c});
      document.getElementById('subscriptionName').value='';document.getElementById('subscriptionCost').value='';
      save();render();showToast('Subscription added');
    });

    if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
    render();
  </script>
</body>
</html>
